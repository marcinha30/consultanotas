<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta NF-e / NFC-e</title>

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:
                radial-gradient(circle at top left, #00d4ff 0, transparent 32%),
                radial-gradient(circle at bottom right, #ff8a00 0, transparent 30%),
                linear-gradient(135deg, #14213d, #006d77 45%, #2a9d8f);
            color:white;
            text-align:center;
            padding:30px;
            margin:0;
            min-height:100vh;
        }

        h1{
            margin-bottom:10px;
            font-size:34px;
            text-shadow:0 3px 10px rgba(0,0,0,.35);
        }

        .subtitulo{
            color:#f1faee;
            margin-bottom:25px;
            font-size:18px;
        }

        .area-consulta{
            background:rgba(255,255,255,.15);
            backdrop-filter:blur(10px);
            padding:28px;
            border-radius:22px;
            display:inline-block;
            max-width:680px;
            width:100%;
            box-shadow:0 18px 45px rgba(0,0,0,.28);
            border:1px solid rgba(255,255,255,.25);
        }

        label{
            display:block;
            text-align:left;
            margin-bottom:8px;
            font-weight:bold;
            color:#ffffff;
        }

        input{
            width:100%;
            padding:16px;
            font-size:18px;
            border:3px solid transparent;
            border-radius:12px;
            margin-bottom:14px;
            outline:none;
            color:#1d3557;
            background:#ffffff;
            box-shadow:0 8px 18px rgba(0,0,0,.15);
        }

        input:focus{
            border-color:#ffbe0b;
            box-shadow:0 0 0 4px rgba(255,190,11,.25);
        }

        .linha-botoes{
            display:flex;
            gap:12px;
            justify-content:center;
            flex-wrap:wrap;
        }

        button,
        .botao-link{
            padding:13px 20px;
            background:linear-gradient(135deg, #ff006e, #fb5607);
            color:white;
            border:none;
            cursor:pointer;
            font-size:17px;
            font-weight:bold;
            border-radius:12px;
            text-decoration:none;
            display:inline-block;
            box-shadow:0 8px 18px rgba(0,0,0,.22);
            transition:.2s ease;
        }

        button:hover,
        .botao-link:hover{
            transform:translateY(-2px);
            filter:brightness(1.08);
        }

        .botao-secundario{
            background:linear-gradient(135deg, #3a86ff, #00b4d8);
        }

        .card{
            margin-top:25px;
            padding:26px;
            background:linear-gradient(135deg, rgba(255,255,255,.20), rgba(255,255,255,.10));
            border-radius:22px;
            box-shadow:0 16px 40px rgba(0,0,0,.26);
            border:1px solid rgba(255,255,255,.25);
        }

        .logo-area{
            width:140px;
            height:95px;
            margin:0 auto 15px auto;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#ffffff;
            border-radius:16px;
            overflow:hidden;
            color:#1d3557;
            font-weight:bold;
            font-size:23px;
            box-shadow:0 10px 25px rgba(0,0,0,.25);
        }

        .logo-area img{
            max-width:100%;
            max-height:100%;
            object-fit:contain;
        }

        .erro{
            margin-top:20px;
            padding:15px;
            background:linear-gradient(135deg, #d00000, #ff595e);
            border-radius:12px;
            font-weight:bold;
            box-shadow:0 8px 18px rgba(0,0,0,.22);
        }

        .alerta{
            margin:15px 0;
            padding:12px;
            background:linear-gradient(135deg, #06d6a0, #2a9d8f);
            border-radius:12px;
            font-weight:bold;
            color:#073b4c;
        }

        h2, h3{
            margin:10px 0;
        }

        p{
            word-break:break-all;
            line-height:1.5;
            font-size:16px;
        }

        @media(max-width:600px){
            body{
                padding:18px;
            }

            h1{
                font-size:28px;
            }

            input{
                font-size:16px;
            }

            button,
            .botao-link{
                width:100%;
            }
        }
    </style>
</head>

<body>

    <h1>Consulta de NF-e / NFC-e</h1>
    <p class="subtitulo">Preencha a chave de acesso com 44 números</p>

    <div class="area-consulta">
        <label for="chave">Chave da nota</label>

        <input
            type="text"
            id="chave"
            maxlength="44"
            inputmode="numeric"
            autocomplete="off"
            placeholder="Digite ou cole a chave da nota"
        >

        <div class="linha-botoes">
            <button onclick="consultarNota()">Consultar</button>
            <button class="botao-secundario" onclick="limparChave()">Limpar</button>
        </div>

        <div id="resultado"></div>
    </div>

<script>
    const estados = {
        "11": { nome:"Rondônia", uf:"RO", logo:"https://flagcdn.com/w320/br-ro.png" },
        "12": { nome:"Acre", uf:"AC", logo:"https://flagcdn.com/w320/br-ac.png" },
        "13": { nome:"Amazonas", uf:"AM", logo:"https://flagcdn.com/w320/br-am.png" },
        "14": { nome:"Roraima", uf:"RR", logo:"https://flagcdn.com/w320/br-rr.png" },
        "15": { nome:"Pará", uf:"PA", logo:"https://flagcdn.com/w320/br-pa.png" },
        "16": { nome:"Amapá", uf:"AP", logo:"https://flagcdn.com/w320/br-ap.png" },
        "17": { nome:"Tocantins", uf:"TO", logo:"https://flagcdn.com/w320/br-to.png" },
        "21": { nome:"Maranhão", uf:"MA", logo:"https://flagcdn.com/w320/br-ma.png" },
        "22": { nome:"Piauí", uf:"PI", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3b/Bandeira_do_Piau%C3%AD.svg" },
        "23": { nome:"Ceará", uf:"CE", logo:"https://flagcdn.com/w320/br-ce.png" },
        "24": { nome:"Rio Grande do Norte", uf:"RN", logo:"https://flagcdn.com/w320/br-rn.png" },
        "25": { nome:"Paraíba", uf:"PB", logo:"https://flagcdn.com/w320/br-pb.png" },
        "26": { nome:"Pernambuco", uf:"PE", logo:"https://upload.wikimedia.org/wikipedia/commons/5/59/Bandeira_de_Pernambuco.svg" },
        "27": { nome:"Alagoas", uf:"AL", logo:"https://flagcdn.com/w320/br-al.png" },
        "28": { nome:"Sergipe", uf:"SE", logo:"https://flagcdn.com/w320/br-se.png" },
        "29": { nome:"Bahia", uf:"BA", logo:"https://upload.wikimedia.org/wikipedia/commons/2/28/Bandeira_da_Bahia.svg" },
        "31": { nome:"Minas Gerais", uf:"MG", logo:"https://upload.wikimedia.org/wikipedia/commons/f/f4/Bandeira_de_Minas_Gerais.svg" },
        "32": { nome:"Espírito Santo", uf:"ES", logo:"https://upload.wikimedia.org/wikipedia/commons/4/43/Bandeira_do_Esp%C3%ADrito_Santo.svg" },
        "33": { nome:"Rio de Janeiro", uf:"RJ", logo:"https://upload.wikimedia.org/wikipedia/commons/7/73/Bandeira_do_estado_do_Rio_de_Janeiro.svg" },
        "35": { nome:"São Paulo", uf:"SP", logo:"https://flagcdn.com/w320/br-sp.png" },
        "41": { nome:"Paraná", uf:"PR", logo:"https://flagcdn.com/w320/br-pr.png" },
        "42": { nome:"Santa Catarina", uf:"SC", logo:"https://flagcdn.com/w320/br-sc.png" },
        "43": { nome:"Rio Grande do Sul", uf:"RS", logo:"https://flagcdn.com/w320/br-rs.png" },
        "50": { nome:"Mato Grosso do Sul", uf:"MS", logo:"https://flagcdn.com/w320/br-ms.png" },
        "51": { nome:"Mato Grosso", uf:"MT", logo:"https://flagcdn.com/w320/br-mt.png" },
        "52": { nome:"Goiás", uf:"GO", logo:"https://flagcdn.com/w320/br-go.png" },
        "53": { nome:"Distrito Federal", uf:"DF", logo:"https://flagcdn.com/w320/br-df.png" }
    };

    const urlsNfcePorUF = {
        "11":"https://www.sefin.ro.gov.br/nfe/consultanfce.htm",
        "12":"https://www.sefaznet.ac.gov.br/nfe/consulta",
        "13":"https://sistemas.sefaz.am.gov.br/nfceweb/consultarNFCe.jsp",
        "14":"https://www.sefaz.rr.gov.br/nfe/servlet/wp_consulta_nfce",
        "15":"https://appnfc.sefa.pa.gov.br/portal/view/consultas/nfce/nfceForm.seam",
        "16":"https://www.sefaz.ap.gov.br/nfce/consulta",
        "17":"https://www.sefaz.to.gov.br/nfce/consulta",
        "21":"https://sistemas1.sefaz.ma.gov.br/portalsefaz/jsp/pagina/pagina.jsf",
        "22":"https://webas.sefaz.pi.gov.br/nfceweb/consultarNFCe.jsf",
        "23":"https://nfce.sefaz.ce.gov.br/pages/consultaNota.jsf",
        "24":"https://nfce.set.rn.gov.br/consultarNFCe.aspx",
        "25":"https://www.sefaz.pb.gov.br/nfce",
        "26":"https://nfce.sefaz.pe.gov.br/nfce-web/consultarNFCe",
        "27":"https://nfce.sefaz.al.gov.br/consultaNFCe.htm",
        "28":"https://www.sefaz.se.gov.br/portal/portalInternet.jsp",
        "29":"https://nfe.sefaz.ba.gov.br/servicos/nfce/default.aspx",
        "31":"https://portalsped.fazenda.mg.gov.br/spedmg/nfce",
        "32":"https://app.sefaz.es.gov.br/ConsultaNFCe",
        "33":"https://consultadfe.fazenda.rj.gov.br/consultaDFe/paginas/consultaChaveAcesso.faces",
        "35":"https://www.nfce.fazenda.sp.gov.br/consulta",
        "41":"https://www.fazenda.pr.gov.br/nfce/qrcode",
        "42":"https://sat.sef.sc.gov.br/tax.NET/Sat.Dfe.NFCe.Web/ConsultaNfce.aspx",
        "43":"https://www.sefaz.rs.gov.br/NFCE/NFCE-COM.aspx",
        "50":"https://www.dfe.ms.gov.br/nfce",
        "51":"https://www.sefaz.mt.gov.br/nfce/consultanfce",
        "52":"http://nfe.sefaz.go.gov.br/nfeweb/sites/nfe/consulta-completa",
        "53":"https://dec.fazenda.df.gov.br/ConsultarNFCe.aspx"
    };

    const campoChave = document.getElementById("chave");

    campoChave.addEventListener("input", function(){
        this.value = this.value.replace(/\D/g, "");

        if(this.value.length === 44){
            consultarNota();
        }
    });

    function consultarNota(){
        const chave = campoChave.value.replace(/\D/g, "");
        const resultado = document.getElementById("resultado");

        resultado.innerHTML = "";

        if(chave.length !== 44){
            resultado.innerHTML = `
                <div class="erro">
                    A chave precisa ter 44 dígitos.
                </div>
            `;
            return;
        }

        const codigoUF = chave.substring(0, 2);
        const modelo = chave.substring(20, 22);
        const estado = estados[codigoUF];

        if(!estado){
            resultado.innerHTML = `
                <div class="erro">
                    Estado não identificado pela chave.
                </div>
            `;
            return;
        }

        let tipoDocumento = "";
        let urlConsulta = "";
        let textoBotao = "";

        if(modelo === "55"){
            tipoDocumento = "NF-e";
            urlConsulta = "https://www.nfe.fazenda.gov.br/portal/consultaRecaptcha.aspx?tipoConsulta=resumo&tipoConteudo=d09fwabTnLk=";
            textoBotao = "Abrir Portal NF-e";
        }
        else if(modelo === "65"){
            tipoDocumento = "NFC-e";
            urlConsulta = urlsNfcePorUF[codigoUF];
            textoBotao = "Abrir SEFAZ NFC-e";
        }
        else{
            tipoDocumento = "Documento Fiscal";
            urlConsulta = "https://www.nfe.fazenda.gov.br/portal/consultaRecaptcha.aspx?tipoConsulta=resumo&tipoConteudo=d09fwabTnLk=";
            textoBotao = "Abrir Consulta";
        }

        if(!urlConsulta){
            resultado.innerHTML = `
                <div class="erro">
                    Link de consulta não encontrado para este estado.
                </div>
            `;
            return;
        }

        localStorage.setItem("ultimaChave", chave);

        resultado.innerHTML = `
            <div class="card">
                <div class="logo-area">
                    <img src="${estado.logo}" alt="Bandeira ${estado.uf}" onerror="this.outerHTML='<span>${estado.uf}<br>SEFAZ</span>'">
                </div>

                <div class="alerta">
                    Documento localizado em ${estado.nome}
                </div>

                <h2>${estado.nome} (${estado.uf})</h2>
                <h3>${tipoDocumento}</h3>

                <p><strong>Chave:</strong></p>
                <p>${chave}</p>

                <div class="linha-botoes">
                    <a class="botao-link" href="${urlConsulta}" target="_blank" rel="noopener noreferrer">
                        ${textoBotao}
                    </a>

                    <button class="botao-secundario" onclick="copiarChave('${chave}')">
                        Copiar Chave
                    </button>
                </div>
            </div>
        `;
    }

    function copiarChave(chave){
        navigator.clipboard.writeText(chave).then(function(){
            alert("Chave copiada.");
        });
    }

    function limparChave(){
        campoChave.value = "";
        document.getElementById("resultado").innerHTML = "";
        campoChave.focus();
    }

    window.addEventListener("load", function(){
        const ultimaChave = localStorage.getItem("ultimaChave");

        if(ultimaChave && ultimaChave.length === 44){
            campoChave.value = ultimaChave;
        }
    });
</script>

</body>
</html>
